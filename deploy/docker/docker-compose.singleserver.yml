services:
  server:
    build:
      context: ../../  # 构建上下文指向项目根目录
      dockerfile: deploy/dockerfiles/Dockerfile  # Dockerfile 路径（相对于 context）
    container_name: im-server
    ports:
      - "8080:8080"
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:5432/group
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_DATA_REDIS_HOST=host.docker.internal
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_LDAP_URLS=ldap://openldap:389
      - SPRING_LDAP_USERNAME=cn=admin,dc=mycompany,dc=com
      - SPRING_LDAP_PASSWORD=admin
      - SPRING_LDAP_BASE=dc=mycompany,dc=com
      # 系统初始化配置
      - SYSTEM_INITIALIZER_ENABLED=true
      - DEFAULT_COMPANY_NAME=public
      - DEFAULT_COMPANY_SCHEMA=public
      - DEFAULT_COMPANY_ACTIVE=true
      - ADMIN_USERNAME=admin
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PHONE_NUMBER=1234567890
      - ADMIN_PASSWORD=12345
      # TCP端口配置
      - TCP_PORT=8088
      # WebRTC配置
      - WEBRTC_SESSION_TIMEOUT=300000
      # JVM配置
      - JAVA_OPTS=-Xmx2g -Xms1g -XX:+UseG1GC
    volumes:
      - ./logs/app:/app/logs
      - ./storage:/app/storage
      - /tmp:/tmp
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ldap_data:
  ldap_config: