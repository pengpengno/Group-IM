  server:
    image: pengpeng163/groupim-server:master
    container_name: im-server-cicd
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-group}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_LDAP_URLS=ldap://openldap:389
      - SPRING_LDAP_USERNAME=cn=admin,dc=mycompany,dc=com
      - SPRING_LDAP_PASSWORD=admin
      - SPRING_LDAP_BASE=dc=mycompany,dc=com
      # 系统初始化配置
      - SYSTEM_INITIALIZER_ENABLED=true
      - DEFAULT_COMPANY_NAME=public
      - DEFAULT_COMPANY_SCHEMA=public
      - DEFAULT_COMPANY_ACTIVE=true
      - ADMIN_USERNAME=admin
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PHONE_NUMBER=1234567890
      - ADMIN_PASSWORD=12345
      # TCP端口配置
      - TCP_PORT=8088
      # WebRTC配置
      - WEBRTC_SESSION_TIMEOUT=300000
      - WEBRTC_TURN_ENABLED=true
      # 服务端下发给客户端的 TURN 信息必须与 coturn 静态账号一致
      - WEBRTC_TURN_SERVER_URL=turn:${COTURN_EXTERNAL_IP:-8.145.54.215}:3478
      - WEBRTC_TURN_SERVER_USERNAME=${COTURN_USER_NAME:-pengpeng}
      - WEBRTC_TURN_SERVER_CREDENTIAL=${COTURN_PASSWORD:-pengpeng123}
    volumes:
      - ./logs/app:/app/logs
      - ./storage:/app/storage
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    #      openldap:
    #        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health/liveness" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s # 应用启动宽限期

networks:
  app-network:
    driver: bridge

volumes:
  web-assets:
