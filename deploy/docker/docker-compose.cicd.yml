services:
  nginx:
    image: nginx:1.29.4
    container_name: nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
#      - ./nginx-tcp.conf:/etc/nginx/stream.conf.d/tcp-proxy.conf:ro
#      - ./ssl:/etc/nginx/ssl
      - web-assets:/usr/share/nginx/html:ro
    networks:
      - app-network
    depends_on:
      server:
        condition: service_started
      frontend-assets-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend-assets-init:
    image: pengpeng163/groupim-web:master
    container_name: frontend-assets-init
    command: sh -c "cp -rf /dist-web/. /usr/share/nginx/html/"
    volumes:
      - web-assets:/usr/share/nginx/html
    networks:
      - app-network

  postgres:
    image: postgres:14.13
    container_name: postgres-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-group}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./create_company_schema_function.sql:/docker-entrypoint-initdb.d/01-create_company_schema_function.sql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis-cache-prod
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  server:
    image: pengpeng163/groupim-server:master
    container_name: im-server-cicd
    ports:
      - "${SERVER_API_PORT:-8080}:8080"
      - "${SERVER_TCP_PORT:-8088}:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-group}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_LDAP_URLS=ldap://openldap:389
      - SPRING_LDAP_USERNAME=cn=admin,dc=mycompany,dc=com
      - SPRING_LDAP_PASSWORD=admin
      - SPRING_LDAP_BASE=dc=mycompany,dc=com
      # 系统初始化配置
      - SYSTEM_INITIALIZER_ENABLED=true
      - DEFAULT_COMPANY_NAME=public
      - DEFAULT_COMPANY_SCHEMA=public
      - DEFAULT_COMPANY_ACTIVE=true
      - ADMIN_USERNAME=admin
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PHONE_NUMBER=1234567890
      - ADMIN_PASSWORD=12345
      # TCP端口配置
      - TCP_PORT=8088
      # WebRTC配置
      - WEBRTC_SESSION_TIMEOUT=300000
    volumes:
      - ./logs/app:/app/logs
      - ./storage:/app/storage
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  app-network:
    driver: bridge

volumes:
  web-assets:
