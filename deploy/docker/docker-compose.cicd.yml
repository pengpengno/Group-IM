services:
  nginx:
    image: nginx:1.29.4
    container_name: nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
      - "${NGINX_TCP_PORT:-8088}:8088"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      #  tls 证书
      # - ./nginx-tls.conf:/etc/nginx/nginx.conf:ro
      # - ./ssl:/etc/nginx/ssl:ro
      - web-assets:/usr/share/nginx/html:ro
    networks:
      - app-network
    depends_on:
      server:
        condition: service_started
      frontend-assets-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend-assets-init:
    image: pengpeng163/groupim-web:master
    container_name: frontend-assets-init
    command: sh -c "cp -rf /dist-web/. /usr/share/nginx/html/"
    volumes:
      - web-assets:/usr/share/nginx/html
    networks:
      - app-network

  postgres:
    image: postgres:14.13
    container_name: postgres-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-group}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./create_company_schema_function.sql:/docker-entrypoint-initdb.d/01-create_company_schema_function.sql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis-cache-prod
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./redis_data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3

  coturn:
    image: coturn/coturn:latest
    container_name: coturn-server
    ports:
      # STUN/TURN 常用监听端口
      - "3478:3478"
      - "3478:3478/udp"
      # TURNS 监听端口（启用证书后可使用）
      - "5349:5349"
      - "5349:5349/udp"
      # TURN relay 媒体端口范围，公网环境通常必须开放
      - "${COTURN_MIN_PORT:-49152}-${COTURN_MAX_PORT:-49252}:${COTURN_MIN_PORT:-49152}-${COTURN_MAX_PORT:-49252}/udp"
    environment:
      # 静态用户名密码，服务端下发给客户端时也使用同一套变量
      - COTURN_USER_NAME=${COTURN_USER_NAME:-pengpeng}
      - COTURN_PASSWORD=${COTURN_PASSWORD:-pengpeng123}
      - COTURN_REALM=${COTURN_REALM:-group.com}
      # 公网部署时必须填写对外可访问的公网 IP，不能是 localhost / 容器内网 IP
      - COTURN_EXTERNAL_IP=${COTURN_EXTERNAL_IP:-8.145.54.215}
      # relay 端口范围需要与上面的 ports 映射一致
      - COTURN_MIN_PORT=${COTURN_MIN_PORT:-49152}
      - COTURN_MAX_PORT=${COTURN_MAX_PORT:-49252}
    command:
      - -n
      - --log-file=stdout
      - --realm=${COTURN_REALM:-group.com}
      - --user=${COTURN_USER_NAME:-pengpeng}:${COTURN_PASSWORD:-pengpeng123}
      # 对外公布的公网 IP，客户端最终会基于这个地址进行 relay
      - --external-ip=${COTURN_EXTERNAL_IP:-127.0.0.1}
      # TURN relay 媒体端口范围
      - --min-port=${COTURN_MIN_PORT:-49152}
      - --max-port=${COTURN_MAX_PORT:-49252}
      - --fingerprint
      - --lt-cred-mech
      - --stale-nonce
      - --no-multicast-peers
      - --no-cli
      - --no-tlsv1
      - --no-tlsv1_1
    networks:
      - app-network
    restart: unless-stopped

