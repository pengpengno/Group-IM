# Docker环境配置
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/group}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
      validation-timeout: 5000
      leak-detection-threshold: 60000
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 4000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 1000ms

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        multiTenancy: SCHEMA

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  ldap:
    urls: ${SPRING_LDAP_URLS:ldap://localhost:389}
    username: ${SPRING_LDAP_USERNAME:cn=admin,dc=mycompany,dc=com}
    password: ${SPRING_LDAP_PASSWORD:admin}
    base: ${SPRING_LDAP_BASE:dc=mycompany,dc=com}
    base-environment:
      java.naming.security.authentication: simple

logging:
  level:
    root: INFO
    com.github.im: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/application.log

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-http-form-post-size: 104857600  # 100MB

# Spring Boot Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus  # 暴露的端点
  endpoint:
    health:
      show-details: always  # 显示详细健康信息
      probes:
        enabled: true  # 启用 Kubernetes 探针
  health:
    livenessState:
      enabled: true  # 存活探针 - 用于 Docker/K8s 检查应用是否存活
    readinessState:
      enabled: true  # 就绪探针 - 用于 K8s 检查应用是否就绪

tcp:
  port: ${TCP_PORT:8088}

# 系统配置（统一在 group 前缀下）
group:
  # 文件存储配置
  storage:
    type: local
    path: /app/storage
  file:
    upload:
      chunk-temp-path: /tmp/chunk-storage
      base-path: uploads
  
  # 系统初始化配置
  system:
    initializer:
      enabled: ${SYSTEM_INITIALIZER_ENABLED:true}
      default-company:
        name: ${DEFAULT_COMPANY_NAME:public}
        schema-name: ${DEFAULT_COMPANY_SCHEMA:public}
        active: ${DEFAULT_COMPANY_ACTIVE:true}
      admin-user:
        username: ${ADMIN_USERNAME:admin}
        email: ${ADMIN_EMAIL:admin@example.com}
        phone-number: ${ADMIN_PHONE_NUMBER:1234567890}
        password: ${ADMIN_PASSWORD:12345}
  
  # AI 配置
  ai:
    enabled: ${SPRING_AI_ENABLED:false}
    groq:
      api-key: ${GROQ_API_KEY:}
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  
  # 序列号生成模式
  sequence:
    mode: redis # memory 或 redis 或 database

  # WebRTC 配置
  webrtc:
    session-timeout: ${WEBRTC_SESSION_TIMEOUT:300000}
    ice-servers:
      - url: ${WEBRTC_STUN_SERVER_URL:stun:stun.l.google.com:19302}
    turn-enabled: ${WEBRTC_TURN_ENABLED:false}
    turn-server:
      url: ${WEBRTC_TURN_SERVER_URL:turn:localhost:3478}
      username: ${WEBRTC_TURN_SERVER_USERNAME:username}
      credential: ${WEBRTC_TURN_SERVER_CREDENTIAL:credential}

# JWT 配置
jwt:
  private.key: classpath:app.key
  public.key: classpath:app.pub
