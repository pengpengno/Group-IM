name: Build and Deploy

on:
  push:
    branches: [main, master]
    tags: ["v*"]

jobs:
  # ==========================================
  # 阶段一：构建 (Build)
  # ==========================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Server Image
        run: docker build -f ./deploy/dockerfiles/Dockerfile -t groupim-server:deploy .

      - name: Build Web Image
        run: docker build -f ./deploy/dockerfiles/Dockerfile.web -t groupim-web:deploy .

      - name: Export Images
        run: |
          mkdir -p release-bundle
          docker image save groupim-server:deploy | gzip > release-bundle/groupim-server-deploy.tar.gz
          docker image save groupim-web:deploy | gzip > release-bundle/groupim-web-deploy.tar.gz

      - name: Upload Deployment Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-images-${{ github.sha }}
          path: release-bundle/*
          if-no-files-found: error
          retention-days: 3

  # ==========================================
  # 阶段二：部署 (Deploy)
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Deployment Bundle Artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-images-${{ github.sha }}
          path: release-bundle

      - name: Prepare Remote Directories
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /opt/app/incoming

      - name: Upload Deployment Bundle to ECS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "release-bundle/groupim-server-deploy.tar.gz,release-bundle/groupim-web-deploy.tar.gz"
          target: /opt/app/incoming
          strip_components: 1
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            docker image load -i /opt/app/incoming/groupim-server-deploy.tar.gz
            docker image load -i /opt/app/incoming/groupim-web-deploy.tar.gz
            docker tag groupim-server:deploy pengpeng163/groupim-server:master
            docker tag groupim-web:deploy pengpeng163/groupim-web:master
            cd /opt/app
            if docker compose version >/dev/null 2>&1; then
              docker compose up -d
            else
              docker-compose up -d
            fi

  # ==========================================
  # 阶段三：通知 (Notify)
  # ==========================================
  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()
    steps:
      - name: Send DingTalk notification
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          GITHUB_COMMIT: ${{ github.sha }}
          GITHUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GITHUB_BRANCH: ${{ github.ref_name }}
          GITHUB_AUTHOR: ${{ github.actor }}
        run: |
          if [[ "${{ needs.build.result }}" == "success" && "${{ needs.deploy.result }}" == "success" ]]; then
            STATUS="✅ 部署成功"
          elif [[ "${{ needs.build.result }}" == "cancelled" || "${{ needs.deploy.result }}" == "cancelled" ]]; then
            STATUS="⚠️ 部署被取消"
          else
            STATUS="❌ 部署失败"
          fi

          MESSAGE="【IM 系统更新】\n部署状态：$STATUS\n分支：$GITHUB_BRANCH\n提交人：$GITHUB_AUTHOR\nCommit: $GITHUB_COMMIT\n提交信息：$GITHUB_COMMIT_MESSAGE"

          curl -s -X POST "$DINGTALK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
                  \"msgtype\": \"text\",
                  \"text\": {
                    \"content\": \"$MESSAGE\"
                  }
                }"
