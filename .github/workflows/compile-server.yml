name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/dockerfiles/Dockerfile
          push: true
          tags: pengpeng163/groupim:${{ github.ref_name }}

      - name: Deploy to Production Server
        id: deploy
        continue-on-error: true
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/app
            curl -sL https://raw.githubusercontent.com/pengpengno/Group-IM/master/deploy/scripts/deploy.sh | bash

      - name: Determine deployment status
        id: status
        run: |
          if [ "${{ steps.deploy.outcome }}" == "failure" ]; then
            echo "status=❌ 部署失败" >> $GITHUB_OUTPUT
            echo "error_info=请查看构建日志：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          else
            echo "status=✅ 部署成功" >> $GITHUB_OUTPUT
            echo "error_info=" >> $GITHUB_OUTPUT
          fi

      - name: Send DingTalk notification
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          GITHUB_COMMIT: ${{ github.sha }}
          GITHUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GITHUB_BRANCH: ${{ github.ref_name }}
          GITHUB_AUTHOR: ${{ github.actor }}
          DEPLOY_STATUS: ${{ steps.status.outputs.status }}
          ERROR_INFO: ${{ steps.status.outputs.error_info }}
        run: |
          if [ -n "$ERROR_INFO" ]; then
            MESSAGE="部署状态：$DEPLOY_STATUS\n分支：$GITHUB_BRANCH\n提交人：$GITHUB_AUTHOR\nCommit: $GITHUB_COMMIT\n错误信息：$ERROR_INFO"
          else
            MESSAGE="部署状态：$DEPLOY_STATUS\n分支：$GITHUB_BRANCH\n提交人：$GITHUB_AUTHOR\nCommit: $GITHUB_COMMIT\n提交信息：$GITHUB_COMMIT_MESSAGE"
          fi
          
          curl -s -X POST $DINGTALK_WEBHOOK \
            -H 'Content-Type: application/json' \
            -d "{
                  \"msgtype\": \"text\",
                  \"text\": {
                    \"content\": \"$MESSAGE\"
                  }
                }"
