name: Build and Deploy

on:
  push:
    branches: [main, master]
    tags: ["v*"]

jobs:
  # ==========================================
  # 阶段一：构建 (Build)
  # ==========================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/dockerfiles/Dockerfile
          push: true
          tags: pengpeng163/groupim-server:${{ github.ref_name }}

      - name: Build and Push Web Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/dockerfiles/Dockerfile.web
          push: true
          tags: pengpeng163/groupim-web:${{ github.ref_name }}

  # ==========================================
  # 阶段二：部署 (Deploy)
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: build # 只有构建 Job 成功才会执行
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: deploy
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker-compose pull
            docker-compose up -d

  # ==========================================
  # 阶段三：通知 (Notify)
  # ==========================================
  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always() # 无论构建和部署是成功还是失败，都必须发送通知
    steps:
      - name: Send DingTalk notification
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          GITHUB_COMMIT: ${{ github.sha }}
          GITHUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GITHUB_BRANCH: ${{ github.ref_name }}
          GITHUB_AUTHOR: ${{ github.actor }}
        run: |
          # 简单的状态获取逻辑
          # needs.build.result 和 needs.deploy.result 记录了前面两个阶段的状态
          if [[ "${{ needs.build.result }}" == "success" && "${{ needs.deploy.result }}" == "success" ]]; then
            STATUS="✅ 部署成功"
          elif [[ "${{ needs.build.result }}" == "cancelled" || "${{ needs.deploy.result }}" == "cancelled" ]]; then
            STATUS="⚠️ 部署被取消"
          else
            STATUS="❌ 部署失败"
          fi
          
          MESSAGE="【IM 系统更新】\n部署状态：$STATUS\n分支：$GITHUB_BRANCH\n提交人：$GITHUB_AUTHOR\nCommit: $GITHUB_COMMIT\n提交信息：$GITHUB_COMMIT_MESSAGE"
          
          curl -s -X POST $DINGTALK_WEBHOOK \
            -H 'Content-Type: application/json' \
            -d "{
                  \"msgtype\": \"text\",
                  \"text\": {
                    \"content\": \"$MESSAGE\"
                  }
                }"
